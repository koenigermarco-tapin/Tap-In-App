<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="0; url=learning-hub.html">
  <link rel="canonical" href="learning-hub.html">
  <script>
    (function() {
      const go = () => window.location.replace('learning-hub.html');
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').finally(go);
      } else {
        go();
      }
    })();
  </script>
</head>
<body>
  <p>If you are not redirected, <a href="learning-hub.html">click here</a>.</p>
</body>
</html>
