<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Values Discovery Assessment - TAP-IN</title>
    <style>
        :root { --black: #0d0d14; --dark-grey: #1a1a24; --mid-grey: #2a2a3a; --light-grey: #8a8a9a; --white: #ffffff; --green: #10b981; --green-glow: rgba(16,185,129,0.3); --gold: #fbbf24; --blue: #3b82f6; --purple: #8b5cf6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--black); min-height: 100vh; color: var(--white); line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, var(--dark-grey) 0%, var(--black) 100%); margin-bottom: 30px; }
        .header h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); margin-bottom: 15px; background: linear-gradient(135deg, var(--gold) 0%, var(--green) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .subtitle { color: var(--light-grey); font-size: 1.1rem; max-width: 500px; margin: 0 auto 25px; }
        .values-preview { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 30px 0; }
        .value-chip { background: var(--mid-grey); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; }
        .start-btn { background: linear-gradient(135deg, var(--green), #059669); color: white; border: none; padding: 18px 50px; font-size: 1.2rem; font-weight: 600; border-radius: 12px; cursor: pointer; }
        .progress-container { position: sticky; top: 0; background: var(--dark-grey); padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--mid-grey); z-index: 100; display: none; }
        .progress-container.show { display: block; }
        .progress-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .progress-bar { height: 8px; background: var(--mid-grey); border-radius: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--green)); border-radius: 10px; transition: width 0.5s; }
        .question-card { background: var(--dark-grey); border-radius: 20px; padding: 35px; margin-bottom: 25px; border: 1px solid var(--mid-grey); display: none; }
        .question-card.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .question-badge { display: inline-block; background: var(--mid-grey); padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; color: var(--light-grey); margin-bottom: 20px; }
        .question-text { font-size: 1.4rem; font-weight: 600; margin-bottom: 10px; }
        .question-sub { color: var(--light-grey); margin-bottom: 25px; font-size: 0.95rem; }
        .vs-choice { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; margin: 20px 0; }
        .vs-option { background: var(--mid-grey); border: 2px solid transparent; border-radius: 16px; padding: 25px 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .vs-option:hover { border-color: var(--green); transform: translateY(-3px); }
        .vs-option.selected { border-color: var(--green); background: rgba(16,185,129,0.15); }
        .vs-option .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .vs-option .name { font-weight: 600; margin-bottom: 5px; }
        .vs-option .desc { font-size: 0.8rem; color: var(--light-grey); }
        .vs-badge { background: var(--black); color: var(--gold); font-weight: 700; padding: 12px; border-radius: 50%; }
        .insight-card { background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(16,185,129,0.1)); border-left: 4px solid var(--gold); border-radius: 12px; padding: 25px; margin-top: 25px; display: none; }
        .insight-card.show { display: block; }
        .insight-card .title { font-weight: 600; color: var(--gold); margin-bottom: 10px; }
        .insight-card .content { color: var(--light-grey); margin-bottom: 15px; }
        .insight-card .quote { font-style: italic; padding: 15px; background: var(--mid-grey); border-radius: 8px; border-left: 3px solid var(--green); }
        .nav-buttons { display: flex; justify-content: space-between; gap: 15px; margin-top: 30px; }
        .btn { padding: 16px 32px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-secondary { background: var(--mid-grey); color: var(--white); }
        .btn-primary { background: linear-gradient(135deg, var(--green), #059669); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .toast { position: fixed; top: 20px; right: 20px; background: var(--green); color: white; padding: 15px 25px; border-radius: 12px; z-index: 1002; display: none; }
        .toast.show { display: block; }
        .results-section { display: none; }
        .results-section.active { display: block; }
        .result-hero { text-align: center; padding: 50px 30px; border-radius: 20px; margin-bottom: 30px; background: linear-gradient(135deg, var(--gold), #d97706); }
        .result-hero h2 { font-size: 2rem; margin-bottom: 15px; }
        .core-values { display: flex; flex-direction: column; gap: 15px; margin: 30px 0; }
        .core-value { background: var(--dark-grey); border: 1px solid var(--mid-grey); border-radius: 16px; padding: 25px; display: flex; align-items: center; gap: 20px; }
        .core-value .rank { font-size: 2rem; font-weight: 700; color: var(--gold); width: 50px; text-align: center; }
        .core-value .icon { font-size: 2rem; }
        .core-value .content h3 { margin-bottom: 5px; }
        .core-value .content p { color: var(--light-grey); font-size: 0.9rem; }
        .result-card { background: var(--dark-grey); border: 1px solid var(--mid-grey); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .result-card h3 { margin-bottom: 15px; }
        .result-card ul { list-style: none; }
        .result-card li { padding: 10px 0; border-bottom: 1px solid var(--mid-grey); color: var(--light-grey); }
        .result-card li:last-child { border-bottom: none; }
        .cta-section { background: linear-gradient(135deg, var(--green), #059669); border-radius: 20px; padding: 40px; text-align: center; }
        .cta-section .btn { background: white; color: var(--green); margin-top: 15px; }
        .lang-switch { position: fixed; top: 20px; right: 20px; display: flex; gap: 5px; background: var(--dark-grey); padding: 5px; border-radius: 8px; z-index: 100; }
        .lang-btn { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; background: transparent; color: var(--light-grey); }
        .lang-btn.active { background: var(--green); color: white; }
        .celebration { position: fixed; inset: 0; background: rgba(13,13,20,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .celebration.show { display: flex; }
        .celebration-content { text-align: center; }
        .celebration-icon { font-size: 5rem; margin-bottom: 20px; }
        .celebration-text { font-size: 1.5rem; font-weight: 600; margin-bottom: 30px; }
        @media (max-width: 600px) { .nav-buttons { flex-direction: column; } .btn { width: 100%; } .vs-choice { grid-template-columns: 1fr; } .vs-badge { order: -1; margin: 10px auto; } }
    </style>
</head>
<body>
    <div class="lang-switch"><button class="lang-btn active">EN</button><button class="lang-btn" onclick="switchLang('de')">DE</button></div>
    <div class="toast" id="toast">+30 XP</div>
    <div class="container">
        <div id="introScreen">
            <div class="header">
                <h1>Discover Your Core Values</h1>
                <p class="subtitle">Your values are your compass. Understanding them unlocks authentic leadership and fulfillment.</p>
                <div class="values-preview">
                    <div class="value-chip">Achievement</div>
                    <div class="value-chip">Connection</div>
                    <div class="value-chip">Growth</div>
                    <div class="value-chip">Balance</div>
                    <div class="value-chip">Security</div>
                    <div class="value-chip">Creativity</div>
                    <div class="value-chip">Impact</div>
                    <div class="value-chip">Freedom</div>
                </div>
                <button class="start-btn" onclick="startAssessment()">Discover My Values</button>
                <p style="margin-top: 20px; color: var(--light-grey);">~5 minutes • 15 trade-off choices • Deep insights</p>
            </div>
        </div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-top"><span id="progressLabel">Choice 1 of 15</span><span id="progressXP" style="color: var(--gold);">+0 XP</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-section" id="resultsSection"><div id="resultsContent"></div></div>
    </div>
    <div class="celebration" id="celebration"><div class="celebration-content"><div class="celebration-icon" id="celebrationIcon"></div><div class="celebration-text" id="celebrationText"></div><button class="btn btn-primary" onclick="closeCelebration()">Continue</button></div></div>
    <script>
        const values = [
            { id: 'achievement', name: 'Achievement', desc: 'Accomplishing goals, success, mastery' },
            { id: 'connection', name: 'Connection', desc: 'Deep relationships, belonging, love' },
            { id: 'growth', name: 'Growth', desc: 'Learning, development, improvement' },
            { id: 'balance', name: 'Balance', desc: 'Harmony, well-being, integration' },
            { id: 'security', name: 'Security', desc: 'Stability, safety, predictability' },
            { id: 'creativity', name: 'Creativity', desc: 'Innovation, expression, originality' },
            { id: 'impact', name: 'Impact', desc: 'Making a difference, contribution' },
            { id: 'freedom', name: 'Freedom', desc: 'Autonomy, independence, flexibility' }
        ];
        const pairs = [[0,1],[2,3],[4,5],[6,7],[0,2],[1,3],[4,6],[5,7],[0,4],[1,5],[2,6],[3,7],[0,6],[1,7],[2,4]];
        const insights = [
            { title: 'Values Hierarchy', content: 'Research shows we have 3-5 core values that drive 80% of our decisions.', quote: '"When values are clear, decisions become easier." - Roy Disney' },
            { title: 'Growth vs Balance', content: 'This is the classic achiever dilemma. Neither is wrong—context matters.', quote: '"Balance is not something you find, it\'s something you create." - Jana Kingsford' },
            { title: 'Security vs Creativity', content: 'Risk tolerance often comes down to this trade-off. Know your baseline.', quote: '"Security is mostly a superstition. Life is either a daring adventure or nothing." - Helen Keller' },
            { title: 'Impact vs Freedom', content: 'Big impact often requires constraints. Freedom often limits scale. Choose wisely.', quote: '"The price of greatness is responsibility." - Winston Churchill' },
            { title: 'Achievement vs Growth', content: 'Results now or capability later? Top performers balance both.', quote: '"The only thing worse than training employees and losing them is not training them and keeping them." - Zig Ziglar' },
            { title: 'Connection vs Balance', content: 'Deep relationships take time. So does self-care. Both are essential.', quote: '"No road is long with good company." - Turkish Proverb' },
            { title: 'Security vs Impact', content: 'Playing it safe rarely changes the world. But burnout helps no one.', quote: '"Ships in harbor are safe, but that\'s not what ships are built for." - John Shedd' },
            { title: 'Creativity vs Freedom', content: 'Creative constraints can spark innovation. Total freedom can paralyze.', quote: '"Creativity is intelligence having fun." - Albert Einstein' }
        ];
        const scores = {}; values.forEach(v => scores[v.id] = 0);
        let currentQ = 0, totalXP = 0;

        function startAssessment() { document.getElementById('introScreen').style.display = 'none'; document.getElementById('progressContainer').classList.add('show'); renderQ(); }
        
        function renderQ() {
            const [a, b] = pairs[currentQ];
            const va = values[a], vb = values[b];
            const ins = insights[currentQ % insights.length];
            document.getElementById('questionsContainer').innerHTML = `
                <div class="question-card active">
                    <div class="question-badge">Choice ${currentQ + 1} of ${pairs.length}</div>
                    <div class="question-text">Which matters MORE to you?</div>
                    <div class="question-sub">If you could only prioritize one, which would you choose?</div>
                    <div class="vs-choice">
                        <div class="vs-option" onclick="select('${va.id}')"><div class="icon">${getIcon(va.id)}</div><div class="name">${va.name}</div><div class="desc">${va.desc}</div></div>
                        <div class="vs-badge">VS</div>
                        <div class="vs-option" onclick="select('${vb.id}')"><div class="icon">${getIcon(vb.id)}</div><div class="name">${vb.name}</div><div class="desc">${vb.desc}</div></div>
                    </div>
                    <div class="insight-card" id="insightCard"><div class="title">${ins.title}</div><div class="content">${ins.content}</div><div class="quote">${ins.quote}</div></div>
                    <div class="nav-buttons">${currentQ > 0 ? '<button class="btn btn-secondary" onclick="prev()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back</button>' : '<div></div>'}<button class="btn btn-primary" id="nextBtn" onclick="next()" disabled>${currentQ === pairs.length - 1 ? 'See Results' : 'Continue'} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button></div>
                </div>`;
            document.getElementById('progressFill').style.width = `${(currentQ / pairs.length) * 100}%`;
            document.getElementById('progressLabel').textContent = `Choice ${currentQ + 1} of ${pairs.length}`;
        }

        function getIcon(id) {
            const icons = { achievement: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>', connection: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M11 12h2a2 2 0 1 0 0-4h-3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M13 12h2a2 2 0 1 0 0-4h-3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/></svg>', growth: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>', balance: '⚖️', security: '🛡️', creativity: '🎨', impact: '🌍', freedom: '🦅' };
            return icons[id] || '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
        }

        function select(id) {
            document.querySelectorAll('.vs-option').forEach(o => o.classList.remove('selected'));
            event.target.closest('.vs-option').classList.add('selected');
            scores[id] += 2;
            document.getElementById('insightCard').classList.add('show');
            document.getElementById('nextBtn').disabled = false;
            totalXP += 30;
            document.getElementById('progressXP').textContent = `+${totalXP} XP`;
            const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500);
        }

        function next() { 
            if (currentQ < pairs.length - 1) { 
                currentQ++; 
                renderQ(); 
                if (currentQ === 8) showCelebration('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>', 'Halfway through!'); 
            } else showResults(); 
        }
        function prev() { if (currentQ > 0) { currentQ--; renderQ(); } }
        function showCelebration(icon, text) { document.getElementById('celebrationIcon').textContent = icon; document.getElementById('celebrationText').textContent = text; document.getElementById('celebration').classList.add('show'); }
        function closeCelebration() { document.getElementById('celebration').classList.remove('show'); }

        function showResults() {
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('questionsContainer').style.display = 'none';
            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            const top3 = sorted.slice(0, 3).map(([id]) => values.find(v => v.id === id));
            showCelebration('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M8 21s-4-3-4-9 4-9 4-9"/><path d="M16 3s4 3 4 9-4 9-4 9"/><path d="M15 8l-6 6"/><path d="M9 8l6 6"/></svg>', `Values discovered! +${totalXP} XP`);
            document.getElementById('resultsSection').classList.add('active');
            document.getElementById('resultsContent').innerHTML = `
                <div class="result-hero"><h2>Your Core Values</h2><p style="opacity: 0.9;">These principles guide your decisions and define your authentic self.</p></div>
                <div class="core-values">${top3.map((v, i) => `<div class="core-value"><div class="rank">#${i + 1}</div><div class="icon">${getIcon(v.id)}</div><div class="content"><h3>${v.name}</h3><p>${v.desc}</p></div></div>`).join('')}</div>
                <div class="result-card"><h3>What This Means</h3><ul><li>Your top value <strong>${top3[0].name}</strong> should be non-negotiable in major decisions</li><li>When ${top3[0].name} and ${top3[1].name} conflict, ${top3[0].name} usually wins</li><li>Career satisfaction requires alignment with at least 2 of your top 3</li><li>Relationship conflicts often trace to different values hierarchies</li></ul></div>
                <div class="result-card"><h3>Values Alignment Check</h3><ul><li><strong>Career:</strong> Does your work honor ${top3[0].name} and ${top3[1].name}?</li><li><strong>Relationships:</strong> Do close people share or respect your values?</li><li><strong>Time:</strong> Do you spend time on ${top3[0].name}-aligned activities?</li></ul></div>
                <div class="cta-section"><h3>Live Your Values</h3><p>The TAP-IN Belt System helps you build habits aligned with your core values.</p><a href="gym-dashboard.html" class="btn">Explore Belt System <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a></div>`;
            localStorage.setItem('tapin-values', JSON.stringify({ top3: top3.map(v => v.id), scores, completedAt: new Date().toISOString(), xp: totalXP }));
        }
        function switchLang(lang) { if (lang === 'de') window.location.href = 'values-discovery-assessment-de.html'; }
    </script>
    <script src="js/assessment-team-sync.js"></script>
    <script>if(typeof AssessmentTeamSync!=="undefined")AssessmentTeamSync.syncToTeamMember();</script>
</body>
</html>
