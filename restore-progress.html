<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c62828">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Restore Progress - TAP-IN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0d0d14 0%, #1a1a24 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            color: #c0392b;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #a0aec0;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #a0aec0;
            font-size: 0.9rem;
            margin-bottom: 8px;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #10b981;
        }
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            text-transform: none;
            letter-spacing: normal;
        }
        .restore-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #a93226, #c0392b);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(169, 50, 38, 0.35);
        }
        .restore-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 26px rgba(169, 50, 38, 0.45);
        }
        .restore-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
        }
        .status.success {
            display: block;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .alt-action {
            color: #a0aec0;
            font-size: 0.9rem;
        }
        .alt-action a {
            color: #c0392b;
            text-decoration: none;
            font-weight: 700;
        }
        .alt-action a:hover {
            text-decoration: underline;
        }
        .example {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #a0aec0;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="language-switcher" style="position: fixed; top: 10px; right: 10px; z-index: 9999; display: flex; gap: 5px;">
        <a href="restore-progress.html" class="lang-btn active" style="padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px; background: #c0392b; color: #fff;">EN</a>
        <a href="restore-progress-de.html" class="lang-btn" style="padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px; background: #2a2a3a; color: #fff;">DE</a>
    </div>

    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 48px; height: 48px; margin: 0 auto;">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
        </div>
        <h1>Restore Your Progress</h1>
        <p class="subtitle">Enter your backup code to continue where you left off</p>
        
        <div class="card">
            <div class="input-group">
                <label>Your Backup Code</label>
                <input type="text" id="backupCode" placeholder="ALPHA-BRAVO-1234" autocomplete="off">
                <div class="example">Example: TIGER-DRAGON-7392</div>
            </div>
            
            <button class="restore-btn" id="restoreBtn" onclick="restoreProgress()">
                Restore Progress
            </button>
            
            <div class="status" id="status"></div>
        </div>
        
        <p class="alt-action">
            Don't have a code? <a href="index.html">Start Fresh</a>
        </p>
    </div>

    <script src="js/auth-system.js"></script>
    <script>
        const codeInput = document.getElementById('backupCode');
        const statusEl = document.getElementById('status');
        const restoreBtn = document.getElementById('restoreBtn');
        
        // Auto-format input
        codeInput.addEventListener('input', (e) => {
            let value = e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
            e.target.value = value;
        });
        
        async function restoreProgress() {
            const code = codeInput.value.trim();
            
            if (!code) {
                showStatus('Please enter your backup code', 'error');
                return;
            }
            
            if (!/^[A-Z]+-[A-Z]+-\d{4}$/.test(code)) {
                showStatus('Invalid code format. Should be like: ALPHA-BRAVO-1234', 'error');
                return;
            }
            
            restoreBtn.disabled = true;
            restoreBtn.textContent = 'Restoring...';
            
            try {
                // Try to restore via auth system
                if (window.tapInAuth && window.tapInAuth.restoreFromBackupCode) {
                    const result = await window.tapInAuth.restoreFromBackupCode(code);
                    if (result.success) {
                        showStatus('Progress restored! Redirecting...', 'success');
                        setTimeout(() => {
                            const cb = Date.now();
                            window.location.href = 'gym-dashboard.html?code-entry=1&cb=' + cb;
                        }, 1000);
                        return;
                    }
                }
                
                // Fallback: Just save code locally and redirect
                localStorage.setItem('tap_in_backup_code', code);
                showStatus('Code saved! Redirecting...', 'success');
                setTimeout(() => {
                    const cb = Date.now();
                    window.location.href = 'gym-dashboard.html?code-entry=1&cb=' + cb;
                }, 1000);
                
            } catch (error) {
                console.error('Restore failed', error);
                localStorage.setItem('tap_in_backup_code', code);
                showStatus('Using local code. Redirecting...', 'success');
                setTimeout(() => {
                    const cb = Date.now();
                    window.location.href = 'gym-dashboard.html?code-entry=1&cb=' + cb;
                }, 1000);
            }
        }
        
        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }
        
        // Allow Enter key to submit
        codeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') restoreProgress();
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
    <script src="js/accessibility-helper.js"></script>
    <script src="js/form-validation.js"></script>
    <script src="js/loading-states.js"></script>
    <script src="js/image-optimizer.js"></script>
</body>
</html>
