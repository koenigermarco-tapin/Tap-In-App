<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c62828">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Achievements | TAP-IN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d0d14;
            --card: #14141f;
            --card-2: #1a1a26;
            --muted: #9ca3af;
            --text: #f8fafc;
            --accent: #8b5cf6;
            --accent-2: #4f46e5;
            --border: #242437;
            --success: #22c55e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 16px 96px;
            line-height: 1.6;
        }
        .container { max-width: 1080px; margin: 0 auto; }
        .achievements-header { text-align: center; margin-bottom: 24px; }
        .achievements-header h1 {
            font-size: clamp(2rem, 4vw, 2.6rem);
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .achievements-header p {
            font-size: 1rem;
            color: var(--muted);
            max-width: 640px;
            margin: 0 auto;
        }
        .progress-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin: 18px 0 24px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--card-radius, 16px);
            padding: 14px 16px;
            text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1.1; }
        .stat-label { color: var(--muted); font-size: 0.95rem; }
        .main-content {
            background: var(--card-2);
            border: 1px solid var(--border);
            border-radius: var(--card-radius, 16px);
            padding: 20px;
            box-shadow: var(--card-shadow, 0 20px 60px rgba(0,0,0,0.35));
        }
        .empty-state {
            padding: 32px 24px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            text-align: center;
            color: var(--muted);
            background: rgba(255,255,255,0.02);
        }
        .category-section { margin-bottom: 24px; }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            color: var(--text);
            gap: 10px;
        }
        .category-title { font-size: 1rem; font-weight: 700; }
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }
        .badge-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            background: var(--card);
        }
        .badge-title { font-weight: 700; margin-bottom: 6px; }
        .badge-meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 6px; }
        .badge-progress { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.05); overflow: hidden; }
        .badge-progress-fill { height: 100%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); width: 0%; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
        .btn {
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; box-shadow: 0 10px 30px rgba(79, 70, 229, 0.35); border: none; }
        .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(14, 14, 20, 0.92);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            align-items: center;
            padding: 0 6px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 120;
        }
        .bottom-nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            padding: 8px 6px;
            border-radius: 10px;
            transition: background 0.2s, color 0.2s;
        }
        .bottom-nav a svg {
            width: 20px;
            height: 20px;
        }
        .bottom-nav a:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text);
        }
        .bottom-nav a.active {
            color: var(--text);
            background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(79,70,229,0.08));
            border: 1px solid rgba(99,102,241,0.25);
        }
        @media (max-width: 768px) {
            body { padding: 16px; }
            .nav-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="achievements-header">
            <h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M5 12h14M12 5l7 7-7 7"/></svg> Achievements</h1>
            <p>Track your leadership journey with unlockable badges. Earn XP and recognition as you progress.</p>
        </div>

        <div class="progress-summary">
            <div class="stat-card">
                <div class="stat-value" id="unlockedCount">0</div>
                <div class="stat-label">Unlocked</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total Badges</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="percentage">0%</div>
                <div class="stat-label">Complete</div>
            </div>
        </div>

        <div class="main-content">
            <div id="achievementsContainer">
                <div class="empty-state">
                    <p>Lade Erfolge...</p>
                </div>
            </div>

            <div class="nav-buttons">
                <a href="gym-dashboard.html" class="btn btn-secondary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to Gym</a>
                <a href="learning-hub.html" class="btn btn-primary">Open Hub <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
            </div>
        </div>
    </div>

    <script src="js/achievement-badges.js"></script>
    <script src="js/language-switcher.js"></script>
    <script src="js/meta-tags-manager.js"></script>
    <script src="js/analytics.js"></script>
    <script>
        function displayAchievements() {
            const container = document.getElementById('achievementsContainer');

            // Check if AchievementSystem is loaded
            if (typeof AchievementSystem === 'undefined') {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 2.6rem; margin-bottom: 0.5rem;">→</div>
                        <p style="margin-bottom: 0.6rem;">Achievements are loading…</p>
                        <p style="color: var(--muted); margin-bottom: 1rem;">Try a quick refresh. If it persists, continue training in the Gym.</p>
                        <a href="gym-dashboard.html" class="btn btn-primary" style="display:inline-flex; align-items:center; gap:6px;">Go to Gym</a>
                    </div>
                `;
                console.warn('AchievementSystem not loaded');
                return;
            }

            // Track page view
            if (typeof TapInAnalytics !== 'undefined') {
                TapInAnalytics.track('achievements_viewed', {
                    language: document.documentElement.lang
                });
            }

            const progress = AchievementSystem.getProgress();
            const byCategory = AchievementSystem.getBadgesByCategory();

            // Update summary stats
            document.getElementById('unlockedCount').textContent = progress.unlocked;
            document.getElementById('totalCount').textContent = progress.total;
            document.getElementById('percentage').textContent = progress.percentage + '%';

            // Show empty state if no achievements yet
            if (progress.unlocked === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="text-align: center; padding: 2.5rem;">
                        <div style="font-size: 3rem; margin-bottom: 0.75rem;">☆</div>
                        <h3 style="margin-bottom: 0.4rem; color: var(--text);">No achievements yet</h3>
                        <p style="color: var(--muted); margin-bottom: 1rem;">Start in the Gym to unlock your first badge.</p>
                        <a href="gym-dashboard.html" class="btn btn-primary">Go to Gym</a>
                    </div>
                `;
                // Still show categories below
            }

            // Build categories HTML
            container.innerHTML = '';

            for (const [catId, category] of Object.entries(byCategory)) {
                const unlockedInCat = category.badges.filter(b => b.unlocked).length;

                const section = document.createElement('div');
                section.className = 'category-section';

                // Category header (German names come from AchievementSystem based on lang="en")
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `
                    <span class="category-icon">${category.icon}</span>
                    <h2>${category.name}</h2>
                    <span class="category-count">${unlockedInCat}/${category.badges.length}</span>
                `;
                section.appendChild(header);

                // Badges grid
                const grid = document.createElement('div');
                grid.className = 'badges-grid';

                category.badges.forEach(badge => {
                    const card = document.createElement('div');
                    card.className = `badge-card ${badge.unlocked ? 'unlocked' : 'locked'}`;

                    card.innerHTML = `
                        ${badge.unlocked
                            ? '<span class="unlocked-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M20 6L9 17l-5-5"/></svg> Freigeschaltet</span>'
                            : '<span class="locked-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>'}
                        <span class="badge-icon">${badge.icon}</span>
                        <div class="badge-name">${badge.name}</div>
                        <div class="badge-description">${badge.description}</div>
                        ${badge.xpReward ? `<span class="badge-xp">+${badge.xpReward} XP</span>` : ''}
                    `;

                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            }
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', displayAchievements);
        } else {
            displayAchievements();
        }

        // Refresh when new achievements unlocked
        window.addEventListener('achievementUnlocked', displayAchievements);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
    <script src="js/form-validation.js"></script>
    <script src="js/loading-states.js"></script>
    <script src="js/image-optimizer.js">    </script>
    
    <nav class="bottom-nav">
        <a href="gym-dashboard.html" aria-label="Gym">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20a6 6 0 00-12 0M12 14V6m0 0a2 2 0 10-4 0 2 2 0 004 0zm0 0a2 2 0 114 0 2 2 0 01-4 0z"/></svg>
            <span>Gym</span>
        </a>
        <a href="learning-hub.html" aria-label="Hub">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10m0 10l-7-6h14l-7 6zM5 12l7-8 7 8"/></svg>
            <span>Hub</span>
        </a>
        <a href="business-portal.html" aria-label="Business">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M7 20h10"/></svg>
            <span>Business</span>
        </a>
        <a href="account.html" aria-label="Account" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3 3-6 8-6s8 3 8 6"/></svg>
            <span>Account</span>
        </a>
    </nav>
</body>
</html>
