<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <title>Team Goals | TAP-IN Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0d0d14;
            --dark-grey: #1a1a24;
            --mid-grey: #2a2a3a;
            --light-grey: #8a8a9a;
            --white: #ffffff;
            --green: #10b981;
            --green-dim: rgba(16, 185, 129, 0.2);
            --gold: #fbbf24;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --red: #ef4444;
            --orange: #f97316;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--black);
            min-height: 100vh;
            color: var(--white);
            line-height: 1.6;
        }
        
        .header {
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.15) 0%, transparent 100%);
            padding: 20px 24px;
            border-bottom: 1px solid var(--mid-grey);
        }
        
        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--light-grey);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: var(--white); }
        
        .header-title {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 24px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .page-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        .page-desc {
            color: var(--light-grey);
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--green);
            color: var(--black);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .btn-secondary {
            background: var(--dark-grey);
            color: var(--white);
            border: 1px solid var(--mid-grey);
        }
        
        /* Progress Overview */
        .progress-overview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .progress-card {
            background: var(--dark-grey);
            border: 1px solid var(--mid-grey);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        
        .progress-ring {
            width: 100px;
            height: 100px;
            margin: 0 auto 16px;
            position: relative;
        }
        
        .progress-ring svg {
            transform: rotate(-90deg);
        }
        
        .progress-ring-bg {
            fill: none;
            stroke: var(--mid-grey);
            stroke-width: 8;
        }
        
        .progress-ring-fill {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        
        .progress-ring-fill.green { stroke: var(--green); }
        .progress-ring-fill.blue { stroke: var(--blue); }
        .progress-ring-fill.gold { stroke: var(--gold); }
        
        .progress-value {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
        }
        
        .progress-label {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .progress-sublabel {
            font-size: 0.85rem;
            color: var(--light-grey);
        }
        
        /* Goals List */
        .goals-section {
            background: var(--dark-grey);
            border: 1px solid var(--mid-grey);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title svg {
            width: 20px;
            height: 20px;
            color: var(--green);
        }
        
        .goal-item {
            background: var(--black);
            border: 1px solid var(--mid-grey);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        
        .goal-item:hover {
            border-color: var(--green);
        }
        
        .goal-item:last-child {
            margin-bottom: 0;
        }
        
        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .goal-info {
            flex: 1;
        }
        
        .goal-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        
        .goal-owner {
            font-size: 0.85rem;
            color: var(--light-grey);
        }
        
        .goal-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .goal-status.on-track { background: var(--green-dim); color: var(--green); }
        .goal-status.at-risk { background: rgba(251, 191, 36, 0.2); color: var(--gold); }
        .goal-status.behind { background: rgba(239, 68, 68, 0.2); color: var(--red); }
        .goal-status.completed { background: rgba(59, 130, 246, 0.2); color: var(--blue); }
        
        .goal-progress {
            margin-bottom: 12px;
        }
        
        .progress-bar-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--mid-grey);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .progress-fill.green { background: var(--green); }
        .progress-fill.gold { background: var(--gold); }
        .progress-fill.red { background: var(--red); }
        .progress-fill.blue { background: var(--blue); }
        
        .progress-percent {
            font-weight: 700;
            font-size: 0.9rem;
            min-width: 45px;
            text-align: right;
        }
        
        .goal-key-results {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .key-result {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--light-grey);
        }
        
        .kr-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--mid-grey);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .kr-check.done {
            background: var(--green);
            border-color: var(--green);
        }
        
        .kr-check svg {
            width: 12px;
            height: 12px;
            color: var(--black);
        }
        
        .key-result.done {
            color: var(--white);
            text-decoration: line-through;
            opacity: 0.7;
        }
        
        /* Add Goal Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--dark-grey);
            border: 1px solid var(--mid-grey);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--light-grey);
            cursor: pointer;
            padding: 4px;
        }
        
        .modal-close:hover {
            color: var(--white);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--black);
            border: 1px solid var(--mid-grey);
            border-radius: 10px;
            color: var(--white);
            font-size: 1rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--green);
        }
        
        .form-select {
            width: 100%;
            padding: 12px 16px;
            background: var(--black);
            border: 1px solid var(--mid-grey);
            border-radius: 10px;
            color: var(--white);
            font-size: 1rem;
            cursor: pointer;
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--green);
            color: var(--black);
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .progress-overview { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; gap: 16px; }
            .goal-header { flex-direction: column; gap: 12px; }
        }
    </style>
    <script src="js/seo-helper.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <a href="team-aggregation-dashboard.html" class="back-link">
                <svg style="width:20px;height:20px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Dashboard
            </a>
            <div class="header-title">
                <svg style="width:20px;height:20px;color:var(--green)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                Team Goals
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="page-header">
            <div>
                <h1 class="page-title">Team Goals & OKRs</h1>
                <p class="page-desc">Track objectives, key results, and team development targets.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>
                Add Goal
            </button>
        </div>
        
        <!-- Progress Overview -->
        <div class="progress-overview">
            <div class="progress-card">
                <div class="progress-ring">
                    <svg width="100" height="100">
                        <circle class="progress-ring-bg" cx="50" cy="50" r="42"/>
                        <circle class="progress-ring-fill green" cx="50" cy="50" r="42" 
                            stroke-dasharray="264" stroke-dashoffset="66" id="overallRing"/>
                    </svg>
                    <div class="progress-value" id="overallPercent">75%</div>
                </div>
                <div class="progress-label">Overall Progress</div>
                <div class="progress-sublabel">Q4 2024 Goals</div>
            </div>
            
            <div class="progress-card">
                <div class="progress-ring">
                    <svg width="100" height="100">
                        <circle class="progress-ring-bg" cx="50" cy="50" r="42"/>
                        <circle class="progress-ring-fill blue" cx="50" cy="50" r="42" 
                            stroke-dasharray="264" stroke-dashoffset="132" id="completedRing"/>
                    </svg>
                    <div class="progress-value" id="completedCount">2/4</div>
                </div>
                <div class="progress-label">Goals Completed</div>
                <div class="progress-sublabel">This Quarter</div>
            </div>
            
            <div class="progress-card">
                <div class="progress-ring">
                    <svg width="100" height="100">
                        <circle class="progress-ring-bg" cx="50" cy="50" r="42"/>
                        <circle class="progress-ring-fill gold" cx="50" cy="50" r="42" 
                            stroke-dasharray="264" stroke-dashoffset="79" id="krRing"/>
                    </svg>
                    <div class="progress-value" id="krCount">8/12</div>
                </div>
                <div class="progress-label">Key Results</div>
                <div class="progress-sublabel">Completed</div>
            </div>
        </div>
        
        <!-- Active Goals -->
        <div class="goals-section">
            <div class="section-header">
                <div class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                    Active Goals
                </div>
                <span style="color: var(--light-grey); font-size: 0.9rem;" id="activeGoalCount">4 goals</span>
            </div>
            
            <div id="goalsList">
                <!-- Generated by JS -->
            </div>
        </div>
    </div>
    
    <!-- Add Goal Modal -->
    <div class="modal-overlay" id="addGoalModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Add New Goal</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg style="width:24px;height:24px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <form onsubmit="addGoal(event)">
                <div class="form-group">
                    <label class="form-label">Goal Title</label>
                    <input type="text" class="form-input" id="goalTitle" placeholder="e.g., Improve team communication" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Owner</label>
                    <select class="form-select" id="goalOwner">
                        <option value="Team">Entire Team</option>
                        <option value="Sarah Johnson">Sarah Johnson</option>
                        <option value="Mike Chen">Mike Chen</option>
                        <option value="Lisa Park">Lisa Park</option>
                        <option value="Tom Wilson">Tom Wilson</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Target Date</label>
                    <input type="date" class="form-input" id="goalDate" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Key Result 1</label>
                    <input type="text" class="form-input" id="kr1" placeholder="e.g., Complete feedback training">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Key Result 2</label>
                    <input type="text" class="form-input" id="kr2" placeholder="e.g., 90% survey satisfaction">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Key Result 3</label>
                    <input type="text" class="form-input" id="kr3" placeholder="e.g., Weekly team standups">
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Goal</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast">
        <svg style="width:20px;height:20px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
        <span id="toastMessage">Goal added successfully</span>
    </div>
    
    <script>
        // Demo goals data
        let goals = [
            {
                id: 1,
                title: 'Increase Team Trust Score to 85%',
                owner: 'Team',
                status: 'on-track',
                progress: 78,
                keyResults: [
                    { text: 'Complete Trust Builder game with all members', done: true },
                    { text: 'Hold 3 vulnerability sharing sessions', done: true },
                    { text: 'Achieve 85% trust score on assessment', done: false }
                ]
            },
            {
                id: 2,
                title: 'Complete Blue Belt for All Team Members',
                owner: 'Team',
                status: 'at-risk',
                progress: 45,
                keyResults: [
                    { text: '100% completion of White Belt', done: true },
                    { text: '80% completion of Blue Belt Stripe 1', done: false },
                    { text: 'All members reach 500 XP minimum', done: false }
                ]
            },
            {
                id: 3,
                title: 'Improve Conflict Resolution Skills',
                owner: 'Sarah Johnson',
                status: 'on-track',
                progress: 90,
                keyResults: [
                    { text: 'Complete Conflict Navigator training', done: true },
                    { text: 'Practice SBIR feedback in 5 situations', done: true },
                    { text: 'Lead conflict resolution workshop', done: false }
                ]
            },
            {
                id: 4,
                title: 'Establish Weekly Accountability Rituals',
                owner: 'Mike Chen',
                status: 'completed',
                progress: 100,
                keyResults: [
                    { text: 'Set up Monday planning meetings', done: true },
                    { text: 'Implement Friday retrospectives', done: true },
                    { text: 'Create shared goals dashboard', done: true }
                ]
            }
        ];
        
        function getStatusColor(status) {
            switch(status) {
                case 'on-track': return 'green';
                case 'at-risk': return 'gold';
                case 'behind': return 'red';
                case 'completed': return 'blue';
                default: return 'green';
            }
        }
        
        function getStatusLabel(status) {
            switch(status) {
                case 'on-track': return 'On Track';
                case 'at-risk': return 'At Risk';
                case 'behind': return 'Behind';
                case 'completed': return 'Completed';
                default: return status;
            }
        }
        
        function renderGoals() {
            const container = document.getElementById('goalsList');
            
            container.innerHTML = goals.map(goal => {
                const color = getStatusColor(goal.status);
                const completedKRs = goal.keyResults.filter(kr => kr.done).length;
                
                return `
                    <div class="goal-item">
                        <div class="goal-header">
                            <div class="goal-info">
                                <div class="goal-title">${goal.title}</div>
                                <div class="goal-owner">Owner: ${goal.owner}</div>
                            </div>
                            <span class="goal-status ${goal.status}">${getStatusLabel(goal.status)}</span>
                        </div>
                        
                        <div class="goal-progress">
                            <div class="progress-bar-container">
                                <div class="progress-bar">
                                    <div class="progress-fill ${color}" style="width: ${goal.progress}%"></div>
                                </div>
                                <span class="progress-percent">${goal.progress}%</span>
                            </div>
                        </div>
                        
                        <div class="goal-key-results">
                            ${goal.keyResults.map(kr => `
                                <div class="key-result ${kr.done ? 'done' : ''}" onclick="toggleKR(${goal.id}, '${kr.text}')">
                                    <div class="kr-check ${kr.done ? 'done' : ''}">
                                        ${kr.done ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>' : ''}
                                    </div>
                                    <span>${kr.text}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            
            // Update stats
            document.getElementById('activeGoalCount').textContent = `${goals.length} goals`;
            updateOverviewStats();
        }
        
        function toggleKR(goalId, krText) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;
            
            const kr = goal.keyResults.find(k => k.text === krText);
            if (!kr) return;
            
            kr.done = !kr.done;
            
            // Recalculate progress
            const completedKRs = goal.keyResults.filter(k => k.done).length;
            goal.progress = Math.round((completedKRs / goal.keyResults.length) * 100);
            
            // Update status based on progress
            if (goal.progress === 100) {
                goal.status = 'completed';
            } else if (goal.progress >= 70) {
                goal.status = 'on-track';
            } else if (goal.progress >= 40) {
                goal.status = 'at-risk';
            } else {
                goal.status = 'behind';
            }
            
            renderGoals();
            showToast(kr.done ? 'Key result completed!' : 'Key result unchecked');
        }
        
        function updateOverviewStats() {
            const totalProgress = goals.reduce((sum, g) => sum + g.progress, 0) / goals.length;
            const completedGoals = goals.filter(g => g.status === 'completed').length;
            const totalKRs = goals.reduce((sum, g) => sum + g.keyResults.length, 0);
            const completedKRs = goals.reduce((sum, g) => sum + g.keyResults.filter(kr => kr.done).length, 0);
            
            // Update percentages
            document.getElementById('overallPercent').textContent = Math.round(totalProgress) + '%';
            document.getElementById('completedCount').textContent = `${completedGoals}/${goals.length}`;
            document.getElementById('krCount').textContent = `${completedKRs}/${totalKRs}`;
            
            // Update rings (circumference = 2 * PI * r = 2 * 3.14 * 42 = 264)
            const circumference = 264;
            document.getElementById('overallRing').style.strokeDashoffset = circumference - (circumference * totalProgress / 100);
            document.getElementById('completedRing').style.strokeDashoffset = circumference - (circumference * completedGoals / goals.length);
            document.getElementById('krRing').style.strokeDashoffset = circumference - (circumference * completedKRs / totalKRs);
        }
        
        function openModal() {
            document.getElementById('addGoalModal').classList.add('active');
            // Set default date to 3 months from now
            const futureDate = new Date();
            futureDate.setMonth(futureDate.getMonth() + 3);
            document.getElementById('goalDate').value = futureDate.toISOString().split('T')[0];
        }
        
        function closeModal() {
            document.getElementById('addGoalModal').classList.remove('active');
        }
        
        function addGoal(e) {
            e.preventDefault();
            
            const title = document.getElementById('goalTitle').value;
            const owner = document.getElementById('goalOwner').value;
            const kr1 = document.getElementById('kr1').value;
            const kr2 = document.getElementById('kr2').value;
            const kr3 = document.getElementById('kr3').value;
            
            const keyResults = [];
            if (kr1) keyResults.push({ text: kr1, done: false });
            if (kr2) keyResults.push({ text: kr2, done: false });
            if (kr3) keyResults.push({ text: kr3, done: false });
            
            // Add default KR if none provided
            if (keyResults.length === 0) {
                keyResults.push({ text: 'Define specific key results', done: false });
            }
            
            const newGoal = {
                id: Date.now(),
                title,
                owner,
                status: 'on-track',
                progress: 0,
                keyResults
            };
            
            goals.unshift(newGoal);
            renderGoals();
            closeModal();
            showToast('Goal added successfully!');
            
            // Reset form
            document.getElementById('goalTitle').value = '';
            document.getElementById('kr1').value = '';
            document.getElementById('kr2').value = '';
            document.getElementById('kr3').value = '';
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', renderGoals);
    </script>
    <script src="js/accessibility-helper.js"></script>
    <script src="js/form-validation.js"></script>
    <script src="js/loading-states.js"></script>
    <script src="js/image-optimizer.js"></script>
</body>
</html>
