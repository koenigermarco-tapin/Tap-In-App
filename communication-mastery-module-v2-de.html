    <script>
        // Calculate progress
        function updateProgress() {
            const lessons = document.querySelectorAll('[data-lesson-id]');
            let completed = 0;
            
            lessons.forEach(lesson => {
                const lessonId = lesson.getAttribute('data-lesson-id');
                if (lessonId && localStorage.getItem(lessonId) === 'complete') {
                    lesson.classList.add('complete');
                    completed++;
                }
            });
            
            const totalLessons = 8; // Include lesson 8 in total
            const percentage = (completed / totalLessons) * 100;
            
            document.getElementById('progressText').textContent = `${completed}/${totalLessons} Complete`;
            document.getElementById('progressBar').style.width = `${percentage}%`;
        }
        
        // Update on page load
        updateProgress();
    </script>
