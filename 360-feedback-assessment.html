<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Feedback Self-Assessment - TAP-IN</title>
    <style>
        :root { --black: #0d0d14; --dark-grey: #1a1a24; --mid-grey: #2a2a3a; --light-grey: #8a8a9a; --white: #ffffff; --green: #10b981; --gold: #fbbf24; --blue: #3b82f6; --purple: #8b5cf6; --red: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--black); min-height: 100vh; color: var(--white); line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, var(--dark-grey) 0%, var(--black) 100%); margin-bottom: 30px; }
        .header h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); margin-bottom: 15px; background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .subtitle { color: var(--light-grey); font-size: 1.1rem; max-width: 500px; margin: 0 auto 25px; }
        .perspectives { display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
        .perspective { background: var(--mid-grey); padding: 20px; border-radius: 12px; text-align: center; min-width: 120px; }
        .perspective .icon { font-size: 2rem; margin-bottom: 8px; }
        .perspective .name { font-size: 0.9rem; }
        .start-btn { background: linear-gradient(135deg, var(--green), #059669); color: white; border: none; padding: 18px 50px; font-size: 1.2rem; font-weight: 600; border-radius: 12px; cursor: pointer; }
        .progress-container { position: sticky; top: 0; background: var(--dark-grey); padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--mid-grey); z-index: 100; display: none; }
        .progress-container.show { display: block; }
        .progress-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .progress-bar { height: 8px; background: var(--mid-grey); border-radius: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--blue)); border-radius: 10px; transition: width 0.5s; }
        .question-card { background: var(--dark-grey); border-radius: 20px; padding: 35px; margin-bottom: 25px; border: 1px solid var(--mid-grey); display: none; }
        .question-card.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .section-header { background: var(--mid-grey); padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; }
        .section-header h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .section-header p { font-size: 0.85rem; color: var(--light-grey); }
        .question-text { font-size: 1.3rem; font-weight: 600; margin-bottom: 25px; }
        .rating-row { display: flex; gap: 10px; margin: 20px 0; }
        .rating-btn { flex: 1; padding: 15px 10px; background: var(--mid-grey); border: 2px solid transparent; border-radius: 10px; cursor: pointer; text-align: center; transition: all 0.2s; }
        .rating-btn:hover { border-color: var(--green); }
        .rating-btn.selected { border-color: var(--green); background: rgba(16,185,129,0.15); }
        .rating-btn .num { font-size: 1.3rem; font-weight: 700; }
        .rating-btn .label { font-size: 0.7rem; color: var(--light-grey); }
        .insight-card { background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(59,130,246,0.1)); border-left: 4px solid var(--purple); border-radius: 12px; padding: 25px; margin-top: 25px; display: none; }
        .insight-card.show { display: block; }
        .insight-card .title { font-weight: 600; color: var(--purple); margin-bottom: 10px; }
        .insight-card .content { color: var(--light-grey); margin-bottom: 15px; }
        .nav-buttons { display: flex; justify-content: space-between; gap: 15px; margin-top: 30px; }
        .btn { padding: 16px 32px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-secondary { background: var(--mid-grey); color: var(--white); }
        .btn-primary { background: linear-gradient(135deg, var(--green), #059669); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .toast { position: fixed; top: 20px; right: 20px; background: var(--green); color: white; padding: 15px 25px; border-radius: 12px; z-index: 1002; display: none; }
        .toast.show { display: block; }
        .results-section { display: none; }
        .results-section.active { display: block; }
        .result-hero { text-align: center; padding: 50px 30px; border-radius: 20px; margin-bottom: 30px; background: linear-gradient(135deg, var(--dark-grey), var(--mid-grey)); }
        .radar-placeholder { width: 250px; height: 250px; margin: 20px auto; background: var(--mid-grey); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--light-grey); }
        .competency-scores { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 30px 0; }
        .comp-score { background: var(--dark-grey); border: 1px solid var(--mid-grey); border-radius: 12px; padding: 20px; }
        .comp-score .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .comp-score .name { font-weight: 600; }
        .comp-score .value { font-size: 1.3rem; font-weight: 700; }
        .comp-score .bar { height: 6px; background: var(--mid-grey); border-radius: 10px; }
        .comp-score .bar-fill { height: 100%; border-radius: 10px; background: var(--green); }
        .result-card { background: var(--dark-grey); border: 1px solid var(--mid-grey); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .result-card h3 { margin-bottom: 15px; }
        .result-card ul { list-style: none; }
        .result-card li { padding: 10px 0; border-bottom: 1px solid var(--mid-grey); color: var(--light-grey); }
        .result-card li:last-child { border-bottom: none; }
        .cta-section { background: linear-gradient(135deg, var(--green), #059669); border-radius: 20px; padding: 40px; text-align: center; }
        .cta-section .btn { background: white; color: var(--green); margin-top: 15px; }
        .lang-switch { position: fixed; top: 20px; right: 20px; display: flex; gap: 5px; background: var(--dark-grey); padding: 5px; border-radius: 8px; z-index: 100; }
        .lang-btn { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; background: transparent; color: var(--light-grey); }
        .lang-btn.active { background: var(--green); color: white; }
        .celebration { position: fixed; inset: 0; background: rgba(13,13,20,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .celebration.show { display: flex; }
        .celebration-content { text-align: center; }
        .celebration-icon { font-size: 5rem; margin-bottom: 20px; }
        .celebration-text { font-size: 1.5rem; font-weight: 600; margin-bottom: 30px; }
        @media (max-width: 600px) { .nav-buttons { flex-direction: column; } .btn { width: 100%; } .competency-scores { grid-template-columns: 1fr; } .rating-row { flex-wrap: wrap; } .rating-btn { min-width: calc(33% - 7px); } }
    </style>
</head>
<body>
    <div class="lang-switch"><button class="lang-btn active">EN</button><button class="lang-btn" onclick="switchLang('de')">DE</button></div>
    <div class="toast" id="toast">+20 XP</div>
    <div class="container">
        <div id="introScreen">
            <div class="header">
                <h1>360° Self-Assessment</h1>
                <p class="subtitle">Rate yourself across key leadership competencies. This self-awareness baseline helps identify blind spots and growth areas.</p>
                <div class="perspectives">
                    <div class="perspective"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div><div class="name">Results</div></div>
                    <div class="perspective"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M11 12h2a2 2 0 1 0 0-4h-3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M13 12h2a2 2 0 1 0 0-4h-3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/></svg></div><div class="name">Relationships</div></div>
                    <div class="perspective"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="name">Communication</div></div>
                    <div class="perspective"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44L2.5 20"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44L21.5 20"/></svg></div><div class="name">Thinking</div></div>
                </div>
                <button class="start-btn" onclick="startAssessment()">Start Self-Assessment</button>
                <p style="margin-top: 20px; color: var(--light-grey);">~6 minutes • 20 questions • Leadership profile</p>
            </div>
        </div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-top"><span id="progressLabel">Question 1 of 20</span><span id="progressXP" style="color: var(--gold);">+0 XP</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-section" id="resultsSection"><div id="resultsContent"></div></div>
    </div>
    <div class="celebration" id="celebration"><div class="celebration-content"><div class="celebration-icon" id="celebrationIcon"></div><div class="celebration-text" id="celebrationText"></div><button class="btn btn-primary" onclick="closeCelebration()">Continue</button></div></div>
    <script>
        const competencies = [
            { id: 'results', name: 'Driving Results', questions: [
                { q: 'I consistently deliver on commitments and meet deadlines', insight: 'Reliability is the foundation of trust. Research shows dependable performers are promoted 30% faster.' },
                { q: 'I set ambitious goals and create clear plans to achieve them', insight: 'Goal clarity correlates with 20% higher performance (Locke & Latham goal-setting research).' },
                { q: 'I take initiative without waiting to be told what to do', insight: 'Proactive employees are rated 21% higher by managers (Journal of Applied Psychology).' },
                { q: 'I make decisions effectively, even with incomplete information', insight: 'Decisiveness is trainable. Amazon\'s "70% rule": Decide at 70% certainty, adjust as you learn.' },
                { q: 'I stay focused on priorities despite distractions', insight: 'Focus is the new IQ. Cal Newport: Deep work produces 2x output of constant task-switching.' }
            ]},
            { id: 'relationships', name: 'Building Relationships', questions: [
                { q: 'I build genuine connections with colleagues at all levels', insight: 'Network diversity predicts career success better than network size (Ronald Burt research).' },
                { q: 'I handle conflicts constructively rather than avoiding them', insight: 'Conflict-capable teams perform 25% better than conflict-avoidant teams.' },
                { q: 'I show empathy and understand others\' perspectives', insight: 'Empathy is the #1 leadership skill. Empathetic leaders have 40% higher team engagement.' },
                { q: 'I give recognition and appreciate others\' contributions', insight: 'Recognition increases engagement by 40% and reduces turnover by 31% (Gallup).' },
                { q: 'I collaborate effectively across team boundaries', insight: 'Cross-functional collaboration predicts innovation success by 35%.' }
            ]},
            { id: 'communication', name: 'Communication', questions: [
                { q: 'I communicate clearly and concisely', insight: 'Clarity reduces misunderstandings by 50%. One study: 80% of workplace issues trace to poor communication.' },
                { q: 'I listen actively and ask thoughtful questions', insight: 'Great listeners are rated 40% more effective as leaders than great speakers.' },
                { q: 'I adapt my communication style to different audiences', insight: 'Style flexibility is a meta-skill. Leaders who flex style have 2x influence.' },
                { q: 'I give feedback that helps others improve', insight: 'Effective feedback increases performance by 39%. Specific + timely = effective.' },
                { q: 'I present ideas persuasively and with confidence', insight: 'Presentation skills are 70% preparation, 30% delivery. Most over-index on delivery.' }
            ]},
            { id: 'thinking', name: 'Strategic Thinking', questions: [
                { q: 'I see the big picture and connect dots others miss', insight: 'Pattern recognition is trainable. Exposure to diverse experiences accelerates it.' },
                { q: 'I anticipate problems before they become crises', insight: 'Preventive thinking saves 10x the cost of reactive fixing.' },
                { q: 'I generate creative solutions to complex problems', insight: 'Creativity peaks when combining deep expertise with diverse inputs.' },
                { q: 'I analyze situations objectively, separating facts from assumptions', insight: 'Cognitive bias awareness reduces decision errors by 40%.' },
                { q: 'I learn quickly from mistakes and adjust my approach', insight: 'Learning velocity is the #1 predictor of leadership potential (Korn Ferry research).' }
            ]}
        ];
        const scores = {}; competencies.forEach(c => scores[c.id] = []);
        let currentQ = 0, totalXP = 0;
        const allQuestions = competencies.flatMap(c => c.questions.map(q => ({ ...q, comp: c })));

        function startAssessment() { document.getElementById('introScreen').style.display = 'none'; document.getElementById('progressContainer').classList.add('show'); renderQ(); }
        
        function renderQ() {
            const q = allQuestions[currentQ];
            const isNewSection = currentQ === 0 || allQuestions[currentQ - 1].comp.id !== q.comp.id;
            document.getElementById('questionsContainer').innerHTML = `
                <div class="question-card active">
                    ${isNewSection ? `<div class="section-header"><h3>${q.comp.name}</h3><p>Rate yourself honestly from 1 (needs work) to 5 (excellent)</p></div>` : ''}
                    <div class="question-text">${q.q}</div>
                    <div class="rating-row">
                        ${[1,2,3,4,5].map(n => `<div class="rating-btn" onclick="rate(${n})"><div class="num">${n}</div><div class="label">${['Needs Work','Below Avg','Average','Good','Excellent'][n-1]}</div></div>`).join('')}
                    </div>
                    <div class="insight-card" id="insightCard"><div class="title">Research Insight</div><div class="content">${q.insight}</div></div>
                    <div class="nav-buttons">${currentQ > 0 ? '<button class="btn btn-secondary" onclick="prev()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back</button>' : '<div></div>'}<button class="btn btn-primary" id="nextBtn" onclick="next()" disabled>${currentQ === allQuestions.length - 1 ? 'See Results' : 'Continue'} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button></div>
                </div>`;
            document.getElementById('progressFill').style.width = `${(currentQ / allQuestions.length) * 100}%`;
            document.getElementById('progressLabel').textContent = `Question ${currentQ + 1} of ${allQuestions.length}`;
        }

        function rate(n) {
            document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
            event.target.closest('.rating-btn').classList.add('selected');
            scores[allQuestions[currentQ].comp.id].push(n);
            document.getElementById('insightCard').classList.add('show');
            document.getElementById('nextBtn').disabled = false;
            totalXP += 20;
            document.getElementById('progressXP').textContent = `+${totalXP} XP`;
            const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500);
        }

        function next() { 
            if (currentQ < allQuestions.length - 1) { 
                currentQ++; 
                renderQ(); 
                if (currentQ === 10) showCelebration('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>', 'Halfway through!'); 
            } else showResults(); 
        }
        function prev() { if (currentQ > 0) { scores[allQuestions[currentQ].comp.id].pop(); currentQ--; renderQ(); } }
        function showCelebration(icon, text) { document.getElementById('celebrationIcon').textContent = icon; document.getElementById('celebrationText').textContent = text; document.getElementById('celebration').classList.add('show'); }
        function closeCelebration() { document.getElementById('celebration').classList.remove('show'); }

        function showResults() {
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('questionsContainer').style.display = 'none';
            const compScores = competencies.map(c => ({ ...c, score: Math.round(scores[c.id].reduce((a,b) => a+b, 0) / scores[c.id].length * 20) }));
            const overall = Math.round(compScores.reduce((a, c) => a + c.score, 0) / compScores.length);
            const sorted = [...compScores].sort((a, b) => a.score - b.score);
            showCelebration('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M8 21s-4-3-4-9 4-9 4-9"/><path d="M16 3s4 3 4 9-4 9-4 9"/><path d="M15 8l-6 6"/><path d="M9 8l6 6"/></svg>', `Assessment complete! +${totalXP} XP`);
            document.getElementById('resultsSection').classList.add('active');
            document.getElementById('resultsContent').innerHTML = `
                <div class="result-hero"><h2>Your Leadership Profile</h2><div class="radar-placeholder">Overall Score: ${overall}%</div></div>
                <div class="competency-scores">${compScores.map(c => `<div class="comp-score"><div class="header"><span class="name">${c.name}</span><span class="value" style="color: ${c.score >= 70 ? 'var(--green)' : c.score >= 50 ? 'var(--gold)' : 'var(--red)'};">${c.score}%</span></div><div class="bar"><div class="bar-fill" style="width: ${c.score}%;"></div></div></div>`).join('')}</div>
                <div class="result-card"><h3>Top Strength: ${sorted[3].name} (${sorted[3].score}%)</h3><ul><li>This is your superpower. Look for ways to leverage it more.</li><li>Consider mentoring others in this area.</li></ul></div>
                <div class="result-card"><h3>Growth Priority: ${sorted[0].name} (${sorted[0].score}%)</h3><ul><li>Focus development energy here for maximum impact.</li><li>Find a mentor or coach strong in this area.</li><li>Set one specific improvement goal for this month.</li></ul></div>
                <div class="result-card"><h3>Development Plan</h3><ul><li><strong>This Week:</strong> Share results with a trusted colleague for feedback</li><li><strong>This Month:</strong> Focus on one behavior change in ${sorted[0].name}</li><li><strong>This Quarter:</strong> Seek 360 feedback from others to compare perspectives</li></ul></div>
                <div class="cta-section"><h3>Develop Your Leadership</h3><p>The TAP-IN Belt System provides structured development across all competencies.</p><a href="gym-dashboard.html" class="btn">Explore Belt System <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a></div>`;
            localStorage.setItem('tapin-360-feedback', JSON.stringify({ overall, competencies: compScores.map(c => ({ id: c.id, score: c.score })), completedAt: new Date().toISOString(), xp: totalXP }));
        }
        function switchLang(lang) { if (lang === 'de') window.location.href = '360-feedback-assessment-de.html'; }
    </script>
    <script src="js/assessment-team-sync.js"></script>
    <script>if(typeof AssessmentTeamSync!=="undefined")AssessmentTeamSync.syncToTeamMember();</script>
</body>
</html>
