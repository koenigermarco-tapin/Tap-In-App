<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c62828">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Leadership DNA - TAP-IN</title>
    <meta property="og:title" content="My Leadership DNA - TAP-IN">
    <meta property="og:description" content="Check out my Leadership DNA profile and discover yours!">
    <meta property="og:type" content="profile">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; padding-top: 40px; }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #10b981;
            margin-bottom: 15px;
        }
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .header p {
            color: #a0aec0;
        }
        
        .dna-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .profile-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .profile-info h2 {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        .profile-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge.worker { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .badge.belt { background: rgba(246, 224, 94, 0.2); color: #f6e05e; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
        }
        .stat-label {
            color: #a0aec0;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .values-section h3 {
            color: #a0aec0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .values-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .value-tag {
            background: rgba(107, 91, 149, 0.2);
            color: #a78bfa;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        
        .team-invite {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(107, 91, 149, 0.1));
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .team-invite h3 {
            color: #3b82f6;
            margin-bottom: 8px;
        }
        .team-invite p {
            color: #a0aec0;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .team-code {
            background: rgba(59, 130, 246, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 15px;
            display: inline-block;
        }
        
        .cta-section {
            text-align: center;
        }
        .cta-btn {
            display: inline-block;
            background: linear-gradient(135deg, #a93226, #c0392b);
            color: #fff;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .cta-btn:hover {
            transform: translateY(-2px);
        }
        .cta-sub {
            color: #a0aec0;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        
        .join-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="language-switcher" style="position: fixed; top: 10px; right: 10px; z-index: 9999; display: flex; gap: 5px;">
        <a href="dna-view.html" class="lang-btn active" style="padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px; background: #10b981; color: #000;">EN</a>
        <a href="dna-view-de.html" class="lang-btn" style="padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px; background: #2a2a3a; color: #fff;">DE</a>
    </div>

    <div class="container">
        <div class="header">
            <div class="header-badge">🧬 Leadership DNA Profile</div>
            <h1 id="profileName">Loading...</h1>
            <p>Shared via TAP-IN</p>
        </div>
        
        <div class="dna-card">
            <div class="profile-header">
                <div class="profile-avatar" id="avatarIcon">🥋</div>
                <div class="profile-info">
                    <h2 id="archetype">-</h2>
                    <div class="profile-badges">
                        <span class="badge worker" id="workerType">-</span>
                        <span class="badge belt" id="beltLevel">-</span>
                    </div>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">Primary Strength</div>
                    <div class="stat-value" id="strength">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Communication</div>
                    <div class="stat-value" id="communication">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Decision Style</div>
                    <div class="stat-value" id="decision">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Energy Pattern</div>
                    <div class="stat-value" id="energy">-</div>
                </div>
            </div>
            
            <div class="values-section">
                <h3>Core Values</h3>
                <div class="values-list" id="valuesList">
                    <span class="value-tag">Loading...</span>
                </div>
            </div>
        </div>
        
        <div class="team-invite" id="teamInvite" style="display:none;">
            <h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg> You're Invited!</h3>
            <p>Join <span id="inviterName">this person</span>'s team on TAP-IN</p>
            <div class="team-code" id="teamCode">TEAM-XXXX</div>
            <br>
            <button class="join-btn" onclick="joinTeam()">Join Team</button>
        </div>
        
        <div class="cta-section">
            <a href="index.html" class="cta-btn">Discover Your Leadership DNA</a>
            <p class="cta-sub">Free • 3 minutes • No signup required</p>
        </div>
    </div>

    <script>
        // Parse URL parameters
        function parseShareData() {
            const params = new URLSearchParams(window.location.search);
            const encoded = params.get('d');
            
            if (!encoded) {
                document.getElementById('profileName').textContent = 'Profile Not Found';
                return null;
            }
            
            try {
                return JSON.parse(atob(encoded));
            } catch (e) {
                console.error('Failed to parse share data:', e);
                return null;
            }
        }
        
        function expandArchetype(code) {
            const archetypes = {
                'Exp': 'Explorer', 'Bui': 'Builder', 'Con': 'Connector',
                'Str': 'Strategist', 'Vis': 'Visionary', 'Men': 'Mentor'
            };
            return archetypes[code] || code;
        }
        
        function expandWorkerType(code) {
            const types = { 'S': 'Sprinter', 'J': 'Jogger', 'U': 'Ultrarunner' };
            return types[code] || code;
        }
        
        function displayProfile(data) {
            if (!data) return;
            
            document.getElementById('profileName').textContent = data.n || 'Anonymous Leader';
            document.getElementById('archetype').textContent = expandArchetype(data.a);
            document.getElementById('workerType').textContent = expandWorkerType(data.w);
            document.getElementById('strength').textContent = data.s || 'Adaptability';
            
            // If team code included, show invite section
            if (data.t) {
                document.getElementById('teamInvite').style.display = 'block';
                document.getElementById('teamCode').textContent = data.t;
                document.getElementById('inviterName').textContent = data.n || 'this leader';
            }
        }
        
        function joinTeam() {
            const data = parseShareData();
            if (data && data.t) {
                localStorage.setItem('tap_in_team_code', data.t);
                localStorage.setItem('tap_in_invited_by', data.n || 'Unknown');
                window.location.href = 'join-team.html?code=' + data.t;
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const data = parseShareData();
            displayProfile(data);
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
