<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c62828">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#1a365d">
    <title>Bewertungsvergleich | TAP-IN Leadership</title>
    <meta name="description" content="Vergleiche deine TAP-IN Bewertungen nebeneinander, um den Fortschritt deines Teams im Laufe der Zeit zu verfolgen.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #0f1f3d 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .page-header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }
        .page-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .page-header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.2);
        }
        #comparisonContainer {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* Language switcher */
        #lang-switch {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1200;
        }
        #lang-switch > div {
            background: white;
            border-radius: 999px;
            padding: 8px 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            font-size: 0.95em;
        }
        #lang-switch a {
            text-decoration: none;
            font-weight: 700;
        }
        #lang-switch a.active {
            color: #1a365d;
        }
        #lang-switch a:not(.active) {
            color: #999;
        }

        @media (max-width: 768px) {
            .page-header h1 { font-size: 1.8em; }
            #comparisonContainer { padding: 20px; }
        }
    
/* Heroicon styles */
.hi {
    width: 1.25em;
    height: 1.25em;
    display: inline-block;
    vertical-align: middle;
    color: currentColor;
}

</style>
</head>
<body>
    <!-- Language Switcher -->
    <div class="language-switcher" style="position: fixed; top: 10px; right: 10px; z-index: 9999; display: flex; gap: 5px;">
        <a href="deep-dive-assessment.html" class="lang-btn " style="padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px; background: #2a2a3a; color: #fff;">EN</a>
        <a href="assessment-comparison-de.html" class="lang-btn active" style="padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px; background: #10b981; color: #000;">DE</a>
    </div>

    <!-- Language switcher -->
    <div id="lang-switch">
        <div>
            <a href="deep-dive-assessment.html">EN</a>
            <span style="color:#ddd;margin:0 8px;">|</span>
            <a href="assessment-comparison-de.html" class="active">DE</a>
        </div>
    </div>

    <div class="container">
        <a href="gym-dashboard-de.html" class="back-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Zurück zum Dashboard</a>

        <div class="page-header">
            <h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M5 12h14M12 5l7 7-7 7"/></svg> Bewertungsvergleich</h1>
            <p>Verfolge den Fortschritt deines Teams im Laufe der Zeit durch Vergleich von Bewertungen</p>
        </div>

        <div id="comparisonContainer">
            <!-- Content loaded by JavaScript -->
            <div style="text-align: center; padding: 40px;">
                <p>Vergleichstool wird geladen...</p>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="team-assessment-enhanced-v2-de.html" style="color: white; text-decoration: none; padding: 12px 24px; background: rgba(255,255,255,0.2); border-radius: 10px; font-weight: 600;">
                Neue Bewertung starten <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
        </div>
    </div>

    <script src="js/comparison-tool.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Set German language for the comparison tool
            if (typeof ComparisonTool !== 'undefined') {
                ComparisonTool.setLanguage('de');
            }
            ComparisonTool.init('comparisonContainer');
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
    <script src="js/form-validation.js"></script>
    <script src="js/loading-states.js"></script>
    <script src="js/image-optimizer.js"></script>
</body>
</html>
