<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c62828">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body style="font-family: Arial, sans-serif; background:#0f172a; color:#e2e8f0; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center;">
    <div>
        <h1 style="margin-bottom:0.5rem;">Redirecting…</h1>
        <p style="margin-bottom:1rem;">Taking you to the combined leadership profile. If you are not redirected automatically, click below.</p>
        <p><a href="combined-profile-carousel.html" style="color:#10b981;">Go now</a></p>
    </div>
    <script>
        const redirectTarget = 'combined-profile-carousel.html';
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {}).finally(() => {
                setTimeout(() => { window.location.href = redirectTarget; }, 50);
            });
        } else {
            window.location.href = redirectTarget;
        }
    </script>
    <script src="js/form-validation.js"></script>
    <script src="js/loading-states.js"></script>
    <script src="js/image-optimizer.js"></script>
</body>
</html>
