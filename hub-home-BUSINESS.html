<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c62828">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>The Hub | TAP-IN Business Development</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-blue: #4a7c9c;
            --primary-dark: #1a1d2e;
            --accent-gold: #f6e05e;
            --success-green: #38a169;
            --text-white: #e2e8f0;
            --text-muted: #94a3b8;
            --card-bg: #252940;
            --border-color: #3d4466;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--primary-dark);
            color: var(--text-white);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Navigation */
        .main-navigation {
            background: rgba(26, 29, 46, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-gold);
            text-decoration: none;
        }

        .nav-center {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-white);
            background: rgba(74, 124, 156, 0.2);
        }

        .language-switcher {
            display: flex;
            gap: 0.5rem;
        }

        .lang-option {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .lang-option:hover, .lang-option.active {
            color: var(--text-white);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #2d4a7c 100%);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
            position: absolute;
            right: -30px;
            bottom: -30px;
            font-size: 150px;
            opacity: 0.1;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .hero p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-blue);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Section Headers */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Module Cards Grid */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .module-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .module-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-blue);
            box-shadow: 0 10px 30px rgba(74, 124, 156, 0.2);
        }

        .module-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #3d6080 100%);
            padding: 1.5rem;
            position: relative;
        }

        .module-header.communication { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .module-header.energy { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .module-header.boundaries { background: linear-gradient(135deg, #d946ef 0%, #a855f7 100%); }
        .module-header.deepwork { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); }
        .module-header.feedback { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .module-header.expectations { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); }

        .module-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .module-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .module-subtitle {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .module-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .module-content {
            padding: 1.25rem;
        }

        .module-progress {
            margin-bottom: 1rem;
        }

        .progress-bar {
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--success-green);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .module-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .module-btn:hover {
            background: #5a8cac;
            transform: translateY(-2px);
        }

        /* Assessments Section */
        .assessments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .assessment-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .assessment-card:hover {
            border-color: var(--primary-blue);
            background: #2d3548;
        }

        .assessment-icon {
            font-size: 2rem;
        }

        .assessment-info {
            flex: 1;
        }

        .assessment-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .assessment-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .assessment-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .assessment-btn:hover {
            background: #5a8cac;
        }

        /* Daily Challenge */
        .daily-challenge {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            border: 2px solid var(--accent-gold);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .challenge-info h3 {
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
        }

        .challenge-info p {
            color: var(--text-muted);
        }

        .challenge-xp {
            background: var(--accent-gold);
            color: #1f2937;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-weight: 700;
        }

        /* Coming Soon Badge */
        .coming-soon {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-center { display: none; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .modules-grid { grid-template-columns: 1fr; }
            .daily-challenge { flex-direction: column; gap: 1rem; text-align: center; }
            .hero h1 { font-size: 2rem; }
        }
    
/* Heroicon styles */
.hi {
    width: 1.25em;
    height: 1.25em;
    display: inline-block;
    vertical-align: middle;
    color: currentColor;
}

</style>
</head>
<body>
    <!-- Navigation -->
    <nav class="main-navigation">
        

        

            
        </div>
    </div>

    <script>
        // Load stats from localStorage
        function loadStats() {
            const totalXP = parseInt(localStorage.getItem('totalXP') || '0');
            const streak = parseInt(localStorage.getItem('currentStreak') || '0');
            const badges = JSON.parse(localStorage.getItem('earnedBadges') || '[]');

            document.getElementById('moduleXP').textContent = totalXP;
            document.getElementById('dayStreak').textContent = streak;
            document.getElementById('badgesEarned').textContent = badges.length;

            // Calculate lessons this week (simplified)
            const lessonsThisWeek = Math.floor(totalXP / 25);
            document.getElementById('lessonsWeek').textContent = Math.min(lessonsThisWeek, 14);
        }

        loadStats();
    </script>
<!-- TAP-IN Utilities -->
<script src="js/shared-utilities.js"></script>
<script src="js/global-error-handler.js"></script>
<script src="js/storage-health.js"></script>
    <!-- TAP-IN Core Modules -->
    <script src="js/language-switcher.js"></script>
    <script src="js/meta-tags-manager.js"></script>
    <script src="js/achievement-badges.js"></script>
    <script src="js/structured-data.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
