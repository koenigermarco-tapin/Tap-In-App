<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Seite nicht gefunden | TAP-IN</title>
    <meta name="description" content="Die gesuchte Seite existiert nicht. Zurück zur TAP-IN Leadership Platform.">
    <meta property="og:title" content="404 - Seite nicht gefunden | TAP-IN">
    <meta property="og:description" content="Die gesuchte Seite existiert nicht. Zurück zur TAP-IN Leadership Platform.">
    <meta property="og:type" content="website">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c62828">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0d0d14 0%, #1a1a24 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #d4a853, #f5d89a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffffff;
        }
        p {
            font-size: 1.1rem;
            color: #a0a0b0;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: linear-gradient(135deg, #d4a853, #c49a3d);
            color: #0d0d14;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 168, 83, 0.4);
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid #2a2a3a;
            color: #e2e8f0;
        }
        .btn-secondary:hover {
            background: rgba(42, 42, 58, 0.5);
        }
        .belt-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="belt-icon">🥋</div>
        <div class="error-code">404</div>
        <h1>Seite nicht gefunden</h1>
        <p>Die gesuchte Seite existiert nicht oder wurde verschoben. Lass uns dich zurück auf deine Leadership-Reise bringen.</p>
        <div class="links">
            <a href="index.html" class="btn">Zur Startseite</a>
            <a href="gym-dashboard-de.html" class="btn btn-secondary">Gym Dashboard</a>
            <a href="learning-hub-de.html" class="btn btn-secondary">Learning Hub</a>
        </div>
    </div>
    <script src="js/language-switcher.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
    <script src="js/accessibility-helper.js"></script>
    <script src="js/form-validation.js"></script>
    <script src="js/loading-states.js"></script>
    <script src="js/image-optimizer.js"></script>
</body>
</html>
